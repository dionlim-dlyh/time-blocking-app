<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="D.lyh">
  <meta name="theme-color" content="#F7F2EA">
  <title>D.lyh</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <div class="header-inner">
        <div class="header-left">
          <span class="header-title">D.lyh</span>
          <span id="header-phase">Phase 1</span>
        </div>
        <div id="header-date-nav">
          <button class="icon-btn" id="prev-date">&#8249;</button>
          <span id="header-date"></span>
          <button class="icon-btn" id="next-date">&#8250;</button>
        </div>
      </div>
    </header>

    <main id="app-main"></main>

    <nav id="app-nav">
      <button class="nav-btn active" data-view="day">
        <span class="nav-icon">&#9776;</span>
        <span>Day</span>
      </button>
      <button class="nav-btn" data-view="week">
        <span class="nav-icon">&#9635;</span>
        <span>Week</span>
      </button>
      <button class="nav-btn" data-view="log">
        <span class="nav-icon">&#10003;</span>
        <span>Log</span>
      </button>
      <button class="nav-btn" data-view="settings">
        <span class="nav-icon">&#9881;</span>
        <span>Settings</span>
      </button>
    </nav>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
